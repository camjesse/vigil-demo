<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password - Vigil HSE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090F;--s1:#0C1018;--s2:#101520;--border:#263648;--accent:#21B8E6;--ok:#19C995;--danger:#EF4444;--text:#D7E3EE;--text2:#93A9BC;--muted:#617A90}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}.wrap{min-height:100vh;display:grid;place-items:center;padding:22px}.card{width:min(420px,100%);background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.42)}.brand{display:flex;align-items:center;gap:9px;margin-bottom:20px}.mark{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--ok));display:grid;place-items:center;color:#061018;font-weight:800}.brand-name{font:800 16px Syne}.title{font:800 23px Syne;margin-bottom:7px}.copy{font-size:12.5px;line-height:1.55;color:var(--text2);margin-bottom:18px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}.field label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}.field input{height:41px;border-radius:6px;border:1px solid var(--border);background:var(--s2);color:var(--text);padding:0 11px;font:inherit;outline:none}.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(33,184,230,.1)}.msg{display:none;margin-bottom:13px;padding:10px;border-radius:6px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#FCA5A5;font-size:12px;line-height:1.45}.msg.show{display:block}.msg.ok{border-color:rgba(25,201,149,.35);background:rgba(25,201,149,.08);color:#86EFAC}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.btn{height:38px;border-radius:6px;border:1px solid var(--border);background:var(--s2);color:var(--text);padding:0 14px;font:700 12px 'DM Sans';cursor:pointer}.btn.primary{background:var(--accent);border-color:var(--accent);color:#061018}.btn:disabled{opacity:.6;cursor:wait}
</style>
</head>
<body>
<div class="wrap">
  <form class="card" id="form">
    <div class="brand"><div class="mark">V</div><div class="brand-name">VIGIL HSE</div></div>
    <div class="title" id="title">Set your password</div>
    <div class="copy" id="copy">Create a secure password to activate your Vigil account.</div>
    <div class="msg" id="msg"></div>
    <div class="field"><label for="password">New password</label><input id="password" type="password" autocomplete="new-password" minlength="12" required></div>
    <div class="field"><label for="confirm">Confirm password</label><input id="confirm" type="password" autocomplete="new-password" minlength="12" required></div>
    <div class="actions"><button class="btn" type="button" onclick="location.href='index.html'">Cancel</button><button class="btn primary" id="submit" type="submit">Set password</button></div>
  </form>
</div>
<script>
const API='https://vigil-production-17ca.up.railway.app';
const params=new URLSearchParams(location.search);
const token=params.get('token')||'';
const mode=params.get('mode')==='reset'?'reset':'invite';
const msg=document.getElementById('msg');
document.getElementById('title').textContent=mode==='reset'?'Reset your password':'Set your password';
document.getElementById('copy').textContent=mode==='reset'?'Enter a new password for your Vigil account.':'Create a secure password to activate your Vigil account.';
function show(text,ok=false){msg.textContent=text;msg.className='msg show'+(ok?' ok':'')}
document.getElementById('form').addEventListener('submit',async e=>{
  e.preventDefault();
  const password=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;
  const submit=document.getElementById('submit');
  if(!token)return show('This password link is missing its token. Ask an administrator for a new link.');
  if(password!==confirm)return show('The passwords do not match.');
  submit.disabled=true;submit.textContent='Saving...';
  const res=await fetch(`${API}/api/auth/${mode==='reset'?'reset-password':'set-password'}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,newPassword:password})}).catch(()=>null);
  const body=await res?.json().catch(()=>({}));
  if(!res||!res.ok){show(body.error||body.details?.[0]?.message||'This link is invalid or has expired. Ask for a new password link.');submit.disabled=false;submit.textContent='Set password';return}
  localStorage.setItem('vigil_session',JSON.stringify({token:body.token,user:body.user,companyId:body.companyId,requiresPasswordChange:false}));
  show('Password saved. Redirecting to Vigil...',true);
  setTimeout(()=>location.href='vigil-demo.html',700);
});
</script>
</body>
</html>
